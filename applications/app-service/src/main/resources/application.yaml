server:
  port: 8080
spring:
  application:
    name: "TicketReservationService"
  devtools:
    add-properties: false
  profiles:
    active: ${ENV:local}
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
aws:
  region: ${AWS_REGION:us-east-1}
adapter:
  dynamodb:
    tickets-table-name: ${TICKETS_TABLE_NAME:tickets}
    orders-table-name: ${ORDERS_TABLE_NAME:orders}
  sqs:
    region: ${AWS_REGION:us-east-1}
    purchase:
      queue-url: ${PURCHASE_QUEUE_URL:http://localstack:4566/000000000000/purchase-requests}
      queue-name: ${PURCHASE_QUEUE_NAME:purchase-requests}
    expiry:
      queue-url: ${EXPIRY_QUEUE_URL:http://localstack:4566/000000000000/reservation-expiry}
      queue-name: ${EXPIRY_QUEUE_NAME:reservation-expiry}
---
spring:
  config:
    activate:
      on-profile: local
aws:
  dynamodb:
    endpoint: ${AWS_DYNAMODB_ENDPOINT:http://dynamodb-local:8000}
adapter:
  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:http://localstack:4566}
